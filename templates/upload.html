<!DOCTYPE html>
<html>
<head>
    <title>Upload Document</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
        input, button {
            margin: 10px;
            padding: 10px;
        }
        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>📄 Upload Legal Document</h1>

    <div class="box">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Upload</button>
        </form>
    </div>

</body>
</html>
