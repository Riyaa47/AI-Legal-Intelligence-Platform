<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .score {
            font-size: 40px;
            font-weight: bold;
        }
        .good { color: green; }
        .bad { color: red; }
        ul {
            text-align: left;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 File: {{ filename }}</h2>

    <h3>Risk Score:</h3>
    <div class="score {% if score > 60 %}good{% else %}bad{% endif %}">
        {{ score }}/100
    </div>

    <h3>Issues Found:</h3>
    <ul>
        {% for issue in issues %}
            <li>{{ issue }}</li>
        {% endfor %}
    </ul>

    <br>
    <a href="/upload">⬅ Upload Another File</a>
</div>

</body>
</html>
